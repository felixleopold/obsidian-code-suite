name: Bug Report
description: Report a reproducible bug or unexpected behaviour in CodeSuite.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: Describe the unexpected behaviour…
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps needed to trigger the bug.
      placeholder: |
        1. Open a note with a Python code block
        2. Click Run
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / screen recordings
      description: If applicable, attach screenshots or a short recording.

  - type: input
    id: obsidian_version
    attributes:
      label: Obsidian version
      placeholder: e.g. 1.8.10
    validations:
      required: true

  - type: input
    id: plugin_version
    attributes:
      label: CodeSuite version
      placeholder: e.g. 1.2.4
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - iOS
        - Android
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help — error messages from the developer console, relevant settings, vault structure, etc.
